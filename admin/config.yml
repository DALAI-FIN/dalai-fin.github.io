backend:
  name: github
  repo: dalai-fin/dalai-fin.github.io
  branch: master

media_folder: "assets/images"
public_folder: "/assets/images"

i18n:
  structure: multiple_folders
  locales: [en, fi]
  default_locale: en

collections:

  - name: "posts"
    label: "News & Events"
    folder: "_posts"
    create: true
    i18n: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm:ss", format: "YYYY-MM-DDTHH:mm:ss+00:00", i18n: duplicate }
      - { label: "Layout", name: "layout", widget: "hidden", default: "post", i18n: duplicate }
      - { label: "Category", name: "categories", widget: "select", options: ["news", "event"], i18n: duplicate }
      - { label: "Header Image", name: "image", widget: "image", required: false, i18n: duplicate }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }

  - name: "pages"
    label: "Pages"
    i18n: true
    files:
      - label: "About"
        name: "about"
        file: "about_{{locale}}.md"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string", i18n: true }
          - { label: "Body", name: "body", widget: "markdown", i18n: true }
      - label: "Events"
        name: "events"
        file: "events_{{locale}}.md"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string", i18n: true }
          - { label: "Body", name: "body", widget: "markdown", i18n: true }
      - label: "News"
        name: "news"
        file: "news_{{locale}}.md"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string", i18n: true }
          - { label: "Body", name: "body", widget: "markdown", i18n: true }
      - label: "Publications"
        name: "publications"
        file: "publications_{{locale}}.md"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string", i18n: true }
          - { label: "Body", name: "body", widget: "markdown", i18n: true }
      - label: "Contact"
        name: "contact"
        file: "contact_{{locale}}.md"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string", i18n: true }
          - { label: "Body", name: "body", widget: "markdown", i18n: true }        
